# Conda environment for PhenoBIC phenotype inference (GPU).
# Create with: conda env create -f environment.yml

name: PhenoBIC
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9.20
  - pip=24.2
  - pandas=2.2.3
  - numpy=1.26.4
  - tifffile=2023.4.12
  - zarr=2.18.2
  - pillow=10.4.0
  - scipy=1.13.1
  - scikit-image=0.24.0
  - pip:
    - tensorflow==2.10.1
    # zarr 2.x needs cbuffer_sizes/cbuffer_metainfo; numcodecs>=0.16 removed them (gh#721)
    - numcodecs==0.12.1
